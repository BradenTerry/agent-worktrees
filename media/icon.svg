<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agent Worktrees">
  <defs>
    <!-- noir backdrop -->
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#10242A"/>
      <stop offset="55%" stop-color="#0A171C"/>
      <stop offset="100%" stop-color="#040A0D"/>
    </radialGradient>
    <!-- brushed-steel head -->
    <linearGradient id="steel" x1="32" y1="46" x2="96" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A4F59"/>
      <stop offset="45%" stop-color="#26363D"/>
      <stop offset="100%" stop-color="#121E23"/>
    </linearGradient>
    <linearGradient id="steelEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6E8C97"/>
      <stop offset="100%" stop-color="#1A282E"/>
    </linearGradient>
    <!-- fedora -->
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243137"/>
      <stop offset="100%" stop-color="#0C1418"/>
    </linearGradient>
    <!-- phosphor visor -->
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0FBF7A"/>
      <stop offset="50%" stop-color="#5BFFC0"/>
      <stop offset="100%" stop-color="#0FBF7A"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.6"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
    </filter>
    <clipPath id="card"><rect x="2" y="2" width="124" height="124" rx="28"/></clipPath>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#bg)"/>

  <g clip-path="url(#card)">
    <!-- ground glow -->
    <ellipse cx="64" cy="118" rx="46" ry="14" fill="#0FBF7A" opacity="0.16" filter="url(#softglow)"/>

    <!-- worktree: branching circuit-tree behind the agent -->
    <g stroke="#23E59A" stroke-width="1.6" fill="none" opacity="0.5" stroke-linecap="round">
      <!-- spine -->
      <path d="M64 112 V26"/>
      <!-- canopy branches -->
      <path d="M64 40 C 52 34, 40 32, 30 22"/>
      <path d="M64 56 C 50 54, 38 56, 24 50"/>
      <path d="M64 44 C 76 38, 88 36, 98 24"/>
      <path d="M64 60 C 80 58, 92 60, 104 52"/>
      <path d="M64 30 C 64 22, 64 18, 64 12"/>
      <!-- roots -->
      <path d="M64 108 C 56 112, 48 114, 38 120"/>
      <path d="M64 108 C 74 112, 82 114, 90 120"/>
    </g>
    <!-- branch nodes -->
    <g fill="#5BFFC0" filter="url(#glow)">
      <circle cx="30" cy="22" r="3"/>
      <circle cx="24" cy="50" r="2.6"/>
      <circle cx="98" cy="24" r="3"/>
      <circle cx="104" cy="52" r="2.6"/>
      <circle cx="64" cy="12" r="3.2"/>
      <circle cx="38" cy="120" r="2.4"/>
      <circle cx="90" cy="120" r="2.4"/>
    </g>

    <!-- ===== ROBOT FIELD AGENT ===== -->
    <!-- antenna through hat -->
    <line x1="64" y1="20" x2="64" y2="9" stroke="#FFC24B" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="64" cy="7" r="3" fill="#FFC24B" filter="url(#glow)"/>

    <!-- fedora -->
    <path d="M44 38 C 44 24, 84 24, 84 38 Z" fill="url(#hat)"/>
    <path d="M44 38 C 44 26, 84 26, 84 38" fill="none" stroke="#3C525B" stroke-width="1"/>
    <!-- hat band -->
    <path d="M44.5 37 C 54 33.5, 74 33.5, 83.5 37" stroke="#0FBF7A" stroke-width="2.4" fill="none"/>
    <!-- brim -->
    <ellipse cx="64" cy="39.5" rx="33" ry="6.5" fill="url(#hat)"/>
    <ellipse cx="64" cy="39.5" rx="33" ry="6.5" fill="none" stroke="#46606B" stroke-width="1" opacity="0.7"/>

    <!-- head -->
    <rect x="38" y="42" width="52" height="50" rx="15" fill="url(#steel)" stroke="url(#steelEdge)" stroke-width="1.4"/>
    <!-- cheek seam -->
    <path d="M42 74 H86" stroke="#0B1417" stroke-width="1.2" opacity="0.6"/>
    <!-- bolts -->
    <g fill="#46606B"><circle cx="44" cy="84" r="1.7"/><circle cx="84" cy="84" r="1.7"/></g>
    <!-- ear modules -->
    <rect x="33" y="60" width="6" height="14" rx="2.5" fill="#1B292F" stroke="#3C525B" stroke-width="1"/>
    <rect x="89" y="60" width="6" height="14" rx="2.5" fill="#1B292F" stroke="#3C525B" stroke-width="1"/>

    <!-- visor housing -->
    <rect x="42" y="56" width="44" height="16" rx="8" fill="#070E11"/>
    <!-- phosphor visor slit -->
    <rect x="46" y="61.5" width="36" height="5" rx="2.5" fill="url(#visor)" filter="url(#glow)"/>
    <!-- sensor pip -->
    <circle cx="74" cy="64" r="1.4" fill="#04130C" opacity="0.8"/>

    <!-- collar / suit -->
    <path d="M48 92 L64 100 L80 92 L84 104 L44 104 Z" fill="#14222A" stroke="#33484F" stroke-width="1"/>
    <!-- bow tie -->
    <path d="M64 96 L58 92 L58 100 Z" fill="#0FBF7A"/>
    <path d="M64 96 L70 92 L70 100 Z" fill="#0FBF7A"/>
    <circle cx="64" cy="96" r="1.8" fill="#5BFFC0"/>
  </g>

  <!-- grain + frame -->
  <rect x="2" y="2" width="124" height="124" rx="28" filter="url(#grain)" clip-path="url(#card)" opacity="0.5"/>
  <rect x="2.5" y="2.5" width="123" height="123" rx="27.5" fill="none" stroke="#3DF7A6" stroke-width="1" opacity="0.25"/>
</svg>
