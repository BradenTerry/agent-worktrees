name: Release

# Two ways to publish; both compile, package the .vsix, create a GitHub release, and
# publish to the VS Code Marketplace when VSCE_PAT is set. The version is the single
# source of truth and is injected into package.json at build time (the committed
# "version" is just a placeholder and is never edited by hand).
#
#   1. Push a plain version tag (regular release):
#        git tag v0.1.0 && git push origin v0.1.0     -> publishes 0.1.0 (regular)
#
#   2. Run this workflow manually (Actions tab -> Release -> Run workflow), enter a
#      version and tick "prerelease" to choose the channel at run time. Plain version
#      numbers only - no "-pre" suffix. The run tags the commit and publishes:
#        version 0.1.1, prerelease checked   -> publishes 0.1.1 (pre-release channel)
#        version 0.1.1, prerelease unchecked -> publishes 0.1.1 (regular channel)
#
# Publishing any pre-release build is what makes the "Switch to Pre-Release Version"
# button appear on the listing; users opt in per-install. Versions are one continuous
# line that always increments - the channel is an independent per-run choice.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, e.g. 1.2.3 (plain number, no v, no -suffix)'
        required: true
        type: string
      prerelease:
        description: 'Publish to the pre-release channel'
        type: boolean
        default: true

permissions:
  contents: write

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Resolve version and release channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            version="${version#v}"          # tolerate a leading v in the input
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              echo "Manual run -> pre-release channel (publishing $version)"
              echo "pre_release_flag=--pre-release" >> "$GITHUB_OUTPUT"
            else
              echo "Manual run -> regular channel (publishing $version)"
              echo "pre_release_flag=" >> "$GITHUB_OUTPUT"
            fi
          else
            version="${GITHUB_REF_NAME#v}"   # tag push is always a regular release
            echo "Tag push $GITHUB_REF_NAME -> regular channel (publishing $version)"
            echo "pre_release_flag=" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: npm version "${{ steps.channel.outputs.version }}" --no-git-tag-version --allow-same-version

      - run: npm ci

      - name: Compile (typecheck + build to out/)
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package extension
        run: npx --yes @vscode/vsce package ${{ steps.channel.outputs.pre_release_flag }} --out worktree-view.vsix

      # On a tag push the tag already exists; on a manual run gh creates it at this commit
      # (a tag created with GITHUB_TOKEN does not re-trigger the push-tag run above).
      - name: Create GitHub release with .vsix
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ steps.channel.outputs.pre_release_flag }}
          TAG: ${{ steps.channel.outputs.tag }}
        run: |
          gh release create "$TAG" worktree-view.vsix \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            ${PRERELEASE_FLAG:+--prerelease}

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish ${{ steps.channel.outputs.pre_release_flag }} --packagePath worktree-view.vsix -p "$VSCE_PAT"
